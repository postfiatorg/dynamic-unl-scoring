services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dynamic_unl_scoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dynamic_unl_scoring"]
      interval: 5s
      timeout: 5s
      retries: 5

  scoring:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:dev_password@postgres:5432/dynamic_unl_scoring
    ports:
      - "8001:8000"
    command: uvicorn scoring_service.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./scoring_service:/app/scoring_service
      - ./migrations:/app/migrations

volumes:
  postgres_data:
