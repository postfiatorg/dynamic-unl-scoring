name: Deploy Devnet

on:
  push:
    branches: [devnet]
  workflow_dispatch:

env:
  IMAGE_NAME: agtipft/dynamic-unl-scoring

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dynamic_unl_scoring
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-docker.txt pytest pytest-asyncio

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/dynamic_unl_scoring
        run: pytest tests/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:devnet-latest
          build-args: |
            SCORING_SERVICE_GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync docker-compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VULTR_DEVNET_HOST }}
          username: ${{ secrets.VULTR_SSH_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          source: docker-compose.devnet.yml
          target: /opt/dynamic-unl-scoring/
          overwrite: true

      - name: Deploy to Vultr
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_DEVNET_HOST }}
          username: ${{ secrets.VULTR_SSH_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          script: |
            cd /opt/dynamic-unl-scoring
            mv docker-compose.devnet.yml docker-compose.yml

            cat > .env << EOF
            PFTL_NETWORK=devnet
            PFTL_RPC_URL=https://rpc.devnet.postfiat.org
            PFTL_WALLET_SECRET=${{ secrets.DEVNET_PFTL_WALLET_SECRET }}
            PFTL_MEMO_DESTINATION=${{ secrets.DEVNET_PFTL_MEMO_DESTINATION }}
            VHS_API_URL=https://vhs.devnet.postfiat.org
            RPC_URL=https://rpc.devnet.postfiat.org
            MODAL_ENDPOINT_URL=${{ secrets.MODAL_ENDPOINT_URL }}
            MODAL_KEY=${{ secrets.MODAL_KEY }}
            MODAL_SECRET=${{ secrets.MODAL_SECRET }}
            MODAL_REQUEST_TIMEOUT_SECONDS=2100
            IPFS_API_URL=${{ secrets.IPFS_API_URL }}
            IPFS_API_USERNAME=${{ secrets.IPFS_API_USERNAME }}
            IPFS_API_PASSWORD=${{ secrets.IPFS_API_PASSWORD }}
            IPFS_GATEWAY_URL=${{ secrets.IPFS_GATEWAY_URL }}
            PINATA_API_KEY=${{ secrets.PINATA_API_KEY }}
            PINATA_API_SECRET=${{ secrets.PINATA_API_SECRET }}
            VL_PUBLISHER_TOKEN=${{ secrets.DEVNET_VL_PUBLISHER_TOKEN }}
            GITHUB_PAGES_TOKEN=${{ secrets.DEVNET_GITHUB_PAGES_TOKEN }}
            GITHUB_PAGES_REPO=postfiatorg/postfiatorg.github.io
            GITHUB_PAGES_FILE_PATH=content/devnet_vl.json
            GITHUB_PAGES_BRANCH=main
            GITHUB_PAGES_COMMIT_AUTHOR_NAME=PostFiat Scoring Service
            GITHUB_PAGES_COMMIT_AUTHOR_EMAIL=scoring@postfiat.org
            ADMIN_API_KEY=${{ secrets.DEVNET_ADMIN_API_KEY }}
            DB_PASSWORD=${{ secrets.DEVNET_DB_PASSWORD }}
            SCORING_CADENCE_HOURS=672
            VL_EFFECTIVE_LOOKAHEAD_HOURS=0.5
            SCORING_MODEL_ID=Qwen/Qwen3.6-27B-FP8
            SCORING_MODEL_NAME=qwen36-27b-fp8
            SCORING_MODEL_REVISION=${{ secrets.DEVNET_SCORING_MODEL_REVISION }}
            SCORING_DISABLE_THINKING=true
            SCORING_GPU_TYPE=H100
            SCORING_QUANTIZATION=
            SCORING_ATTENTION_BACKEND=
            SCORING_SGLANG_IMAGE_TAG=lmsysorg/sglang:nightly-dev-cu13-20260430-e60c60ef@sha256:5d9ec71597ade6b8237d61ae6f01b976cb3d5ad2c1e3cf4e0acaf27a9ff49a65
            SCORING_REASONING_PARSER=qwen3
            SCORING_TP=1
            SCORING_MEM_FRACTION=0.75
            SCORING_CHUNKED_PREFILL=4096
            SCORING_MAX_REQS=1
            SGLANG_FLASHINFER_WORKSPACE_SIZE=2147483648
            EXCLUDED_VALIDATOR_SERVER_VERSIONS=3.0.0
            ANNOUNCEMENT_COMMIT_WINDOW_SECONDS=900
            ANNOUNCEMENT_REVEAL_WINDOW_SECONDS=300
            ANNOUNCEMENT_REVEAL_GAP_SECONDS=0
            UNL_MAX_SIZE=3
            UNL_SCORE_CUTOFF=40
            UNL_MIN_SCORE_GAP=5
            DEBUG=false
            LOG_LEVEL=INFO
            EOF

            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
