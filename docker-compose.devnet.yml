services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dynamic_unl_scoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dynamic_unl_scoring"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  scoring:
    image: agtipft/dynamic-unl-scoring:devnet-latest
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/dynamic_unl_scoring
      PFTL_NETWORK: devnet
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
